<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CookCookCook - Home</title>
        <link rel="stylesheet" href="static/css/styles.css"/>
        
        <!--REMOVE LATER; FOR TESTING ONLY-->
        <link rel="stylesheet" href="static/css/home.css"/>
        <!--REMOVE LATER; FOR TESTING ONLY-->

        <link rel="icon" href="assets/images/main-logo-500.png"/>
    </head>                                                     
    <body>
        <div class="login">
            <!--Later, make it so that when a user enters the website, it detects if he/she is already logged in-->
            <div class="setup-step" id="welcome-page">
                <p style="font-size: 4cqh; margin-bottom: 0.5vh">Welcome to</p>
                <p style="font-size: 8cqh; margin-bottom: 1vh">CookCookCook</p>
                <p style="font-size: 1.8cqh; margin-bottom: 3vh">a project by Frank Kang</p>
                <button id="get-started">Get started &rarr;</button>
            </div>
            <div class="setup-step active" id="login-page">
                <p style="font-size: 2cqh; margin-bottom: 3vh" id="login-prompt">Please login with your amersol Google account to continue</p>
                <button id="authorize-button" onclick="handleAuthClick()">
                    <img style="justify-self: flex-start;" src="assets/images/google-logo.svg"/>
                    <p>Log In</p>
                </button>
            </div>
            <div class="setup-step" id="template">
                <!--This is here in case I want to add more login steps later.-->
            </div>
        </div>                                              
        <nav class="sidebar hide-before-login">
            <ul>
                <li><a href="/" data-link><img src="assets/images/main-logo-500.png" width="80%"></a></li>
                <li><a href="/calendar" data-link>Calendar</a></li>
                <li><a href="/projects" data-link>Projects</a></li>
                <li><a href="/habits" data-link>Habits</a></li>
                <li><a href="/settings" data-link>Settings</a></li>
                <li><a href="/profile" data-link>Profile</a></li>
            </ul>
        </nav>
        <div class="page hide-before-login">

        </div>
        <script type="module" src="static/js/script.js"></script>
        <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
        <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
        <script type="text/javascript">
        
        const CLIENT_ID = '425582770030-aqi82df9n7t92mhnhjnmkqhrck5sbb62.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyBYOJdgCtyNzyrtqmsAVHP1DvRfbHg2mtM';

        const DISCOVERY_DOCS = [
            'https://sheets.googleapis.com/$discovery/rest?version=v4',
            'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
            ];

        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/calendar';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        document.getElementById('authorize_button').style.visibility = 'hidden';

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: DISCOVERY_DOCS,
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: '',
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
            document.getElementById('authorize_button').style.visibility = 'visible';
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) {
                throw (resp);
            }
            document.getElementById("login-prompt").innerText = "Login successful!";
            document.getElementById('authorize_button').style.visibility = 'hidden';
            };

            if (gapi.client.getToken() === null) {
            // Prompt the user to select a Google Account and ask for consent to share their data
            // when establishing a new session.
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
            // Skip display of account chooser and consent dialog for an existing session.
                tokenClient.requestAccessToken({prompt: ''});
            }
        }
        
    </script>
    </body>
</html>
